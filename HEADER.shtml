<!doctype html>
<html lang="de">

<head>
	<meta charset="utf-8">
	<meta lang="de_AT">
	<link rel="icon" type="image/x-icon" href="/favicon.ico">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/main.css">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/overlay.css">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/gallery.css">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/musicplayer.css">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/inputs.css">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/toast.css">
	<link rel="stylesheet" type="text/css" href="/fancy-directory-index/css/aero.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<nav class="d-flex flex-nowrap justify-content-between">
		<div class="d-flex">
			<div class="nav-flex-column">
				<img class="favicon" id="pageicon" alt="Icon" />
			</div>
			<div class="nav-flex-column">
				<div class="dirpath" id="dirpath"></div>
			</div>
		</div>
		<div class="d-flex gap">
			<div class="nav-flex-column">
				<input type="search" placeholder="Search...">
			</div>
			<div class="nav-flex-column">
				<div class="input-group">
					<input value="0" type="radio" id="radio-gallery" name="radio-view" checked="" hidden>
					<label class="btn btn-outline big append" for="radio-gallery">
						<div class="masked-icon" id="masked-icon-gallery"></div>
					</label>
					<input value="1" type="radio" id="radio-details" name="radio-view" hidden>
					<label class="btn btn-outline big prepend" for="radio-details">
						<div class="masked-icon" id="masked-icon-details"></div>
					</label>
				</div>
			</div>
			<div class="nav-flex-column">
				<a href="/fancy-directory-index/settings" class="btn btn-outline big">
					<div class="masked-icon" style="mask-image: url('/fancy-directory-index/assets/configure.svg')">
					</div>
				</a>
			</div>
		</div>
	</nav>
	<!--<div class="overlay d-none" id="overlay">
		<button class="close d-desktop"></button>
		<div class="grid">
			<div class="preview"></div>
			<div class="info"></div>
		</div>
	</div>-->
	<div id="dashboard" class="dashboard wallpaper">
		<input id="radio-page-preview" type="radio" name="dashboard-pages" value="1" autocomplete="off">
		<div class="dashboard-page">
			<div class="preview">
			<figure id="preview-figure">
				<video id="preview-fd-video" controls="" class="filedisplay d-none">
					Your browser does not support this Video
				</video>
				<iframe id="preview-fd-text" src="" title="File Preview"></iframe> 
				<img id="preview-fd-image" class="filedisplay d-none">
				<embed id="preview-fd-pdf" class="pdf filedisplay d-none">
				<figcaption id="preview-figcaption">FILENAME</figcaption>
				<button id="preview-prev" class="prev">&#8249;</button>
				<button id="preview-next" class="next">&#8250;</button>
			</figure>
			<hr class="d-mobile">
			<div class="info">
				<figure>
					<img id="preview-mimeicon" class="mimeicon" alt="[IMG]"
						src="/fdi-icon-theme/mimetypes/64/video-x-generic.svg">
					<figcaption id="preview-mimefigcaption">
						<!--<div class="caption">FILENAME</div>-->
					</figcaption>
				</figure>
				<div class="actions">
					<button class="action" disabled="true">Actions:</button>
					<button id="preview-a-share" class="action d-flex justify-content-left gap d-none" type="button">
						<div class="sillouhette-img">
							<div class="masked-icon"
								style="mask-image: url(&quot;/fancy-directory-index/assets/share.svg&quot;);">
							</div>
						</div>
						<div>Share</div>
					</button>
					<button id="preview-a-copy" class="action d-flex justify-content-left gap">
						<div class="sillouhette-img">
							<div class="masked-icon"
								style="mask-image: url(&quot;/fancy-directory-index/assets/edit-copy.svg&quot;);"></div>
						</div>
						<div>Copy Link</div>
					</button>
					<a id="preview-a-open" class="action d-flex justify-content-left gap" target="_blank"
						href="Russian Female Butt Slap Contest.mp4">
						<div class="sillouhette-img">
							<div class="masked-icon"
								style="mask-image: url(&quot;/fancy-directory-index/assets/newtab.svg&quot;);"></div>
						</div>
						<div>Open in new tab</div>
					</a>
					<a id="preview-a-download" class="action d-flex justify-content-left gap" href="Russian Female Butt Slap Contest.mp4"
						download="Russian Female Butt Slap Contest.mp4">
						<div class="sillouhette-img">
							<div class="masked-icon"
								style="mask-image: url(&quot;/fancy-directory-index/assets/download.svg&quot;);"></div>
						</div>
						<div>Download</div>
					</a>
				</div>
				<hr class="d-mobile">
				<div class="actions">
					<button id="preview-a-close" class="action">Close</button>
				</div>
			</div>
			</div>
		</div>
		<input id="radio-page-gallery" type="radio" name="dashboard-pages" value="0" autocomplete="off" checked>
		<div class="dashboard-page gallery">
			<div id="sortingButtons">
				<div class="placeholder"></div>
			</div>
			<div class="widget widget-gallery" id="widget-gallery">
				<article id="gallery"></article>
			</div>
			<div class="d-none d-block flex-grow-1" id="widget-details">
				<div class="widget widget-filelist">
					<article id="filelist">
